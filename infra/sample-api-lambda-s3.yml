AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Simple Data Pipeline: REST API (API Gateway) -> AWS Lambda -> Amazon S3
  This can be used to test the Pipeline Intelligence Engine.

Parameters:
  BucketName:
    Type: String
    Default: simple-pipeline-data-bucket-12345
    Description: The name of the S3 bucket to store API payloads.

Resources:
  # 1. S3 Bucket to store the incoming data
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # 2. Lambda Function to process REST API requests and save to S3
  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: python3.11
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
      Policies:
        # Give Lambda permission to write to our S3 bucket
        - S3WritePolicy:
            BucketName: !Ref DataBucket
      InlineCode: |
        import json
        import os
        import boto3
        import uuid
        from datetime import datetime

        s3_client = boto3.client('s3')
        BUCKET_NAME = os.environ['BUCKET_NAME']

        def handler(event, context):
            print("Received event:", json.dumps(event))
            
            # Parse the request body
            body = event.get('body', '{}')
            if event.get('isBase64Encoded', False):
                import base64
                body = base64.b64decode(body).decode('utf-8')
                
            # Create a unique file name mapping to the current date
            timestamp = datetime.utcnow().strftime('%Y-%m-%d/%H-%M-%S')
            file_name = f"raw-ingest/{timestamp}-{str(uuid.uuid4())[:8]}.json"
            
            # Write the API payload to S3
            s3_client.put_object(
                Bucket=BUCKET_NAME,
                Key=file_name,
                Body=body,
                ContentType='application/json'
            )
            
            return {
                "statusCode": 200,
                "body": json.dumps({
                    "message": "Data successfully ingested to S3",
                    "file_path": f"s3://{BUCKET_NAME}/{file_name}"
                })
            }
      Events:
        # 3. REST API (API Gateway) triggering our Lambda
        ApiEvent:
          Type: Api
          Properties:
            Path: /ingest
            Method: post

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL for POST requests"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/ingest"
  DataBucketName:
    Description: "S3 Bucket where API payloads are stored"
    Value: !Ref DataBucket
