[pytest]
# Root of the source tree so imports resolve without installing the package
testpaths = tests

# Show short tracebacks by default
addopts =
    --tb=short
    -v
    --strict-markers

# asyncio mode for pytest-asyncio
asyncio_mode = auto

# Custom markers used across the suite
markers =
    unit:        Fast, isolated unit tests (no I/O)
    integration: Tests that hit real or mocked network services
    slow:        Tests that take >1 s each
